<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>知识库 — LocalRAG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: #1e1e2e; color: #cdd6f4; display: flex; flex-direction: column; padding: 20px 0; position: fixed; top: 0; left: 0; bottom: 0; }
.sidebar h2 { padding: 0 20px 20px; font-size: 18px; color: #fff; border-bottom: 1px solid #313244; }
.sidebar nav { flex: 1; padding: 10px 0; }
.sidebar a { display: block; padding: 10px 20px; color: #a6adc8; text-decoration: none; font-size: 14px; transition: .15s; }
.sidebar a:hover, .sidebar a.active { background: #313244; color: #fff; }
.sidebar .divider { border-top: 1px solid #313244; margin: 10px 16px; }
.sidebar .info { padding: 10px 20px; font-size: 12px; color: #585b70; }
.main { margin-left: 220px; flex: 1; padding: 24px 32px; }
h3 { margin-bottom: 16px; }
.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 20px 24px; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
th { font-weight: 600; color: #6b7280; font-size: 12px; text-transform: uppercase; }
.status { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.status-uploading { background: #dbeafe; color: #1e40af; }
.status-ready { background: #fef3c7; color: #92400e; }
.status-chunked { background: #ffedd5; color: #9a3412; }
.status-embedded { background: #d1fae5; color: #065f46; }
.status-deleted { background: #fee2e2; color: #991b1b; }
.btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
.btn-danger { background: #fee2e2; color: #991b1b; } .btn-danger:hover { background: #fecaca; }
.btn-dl { background: #e0e7ff; color: #3730a3; text-decoration: none; } .btn-dl:hover { background: #c7d2fe; }
.empty { text-align: center; color: #9ca3af; padding: 40px 0; font-size: 14px; }
.refresh { margin-bottom: 16px; }
</style>
</head>
<body>
<div class="sidebar">
    <h2>LocalRAG</h2>
    <nav>
        <a href="/upload.html">📤 文件上传</a>
        <a href="/kb.html" class="active">📚 知识库</a>
        <a href="/chat.html">💬 对话</a>
    </nav>
    <div class="divider"></div>
    <div class="info">ES: localhost:9200<br>MinIO: localhost:19001<br>Kafka: localhost:9092</div>
</div>
<div class="main">
    <h3>📚 知识库</h3>
    <button class="btn btn-dl refresh" onclick="loadFiles()" style="font-size:13px;padding:8px 16px;">🔄 刷新</button>
    <div class="card">
        <table>
            <thead><tr><th>文件名</th><th>MD5</th><th>大小</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
            <tbody id="fileList"><tr><td colspan="6" class="empty">加载中...</td></tr></tbody>
        </table>
    </div>
</div>
<script>
async function loadFiles(){
    const tbody=document.getElementById('fileList');
    try{
        const r=await fetch('/api/storage/files');
        const d=await r.json();
        if(d.code!==200){tbody.innerHTML='<tr><td colspan="6" class="empty">加载失败</td></tr>';return;}
        const files=(d.data||[]).filter(f=>f.status!=='DELETED');
        if(files.length===0){tbody.innerHTML='<tr><td colspan="6" class="empty">暂无文件，请先上传</td></tr>';return;}
        tbody.innerHTML=files.map(f=>'<tr>'+
            '<td>'+esc(f.fileName)+'</td>'+
            '<td style="font-size:11px;font-family:monospace;">'+esc(f.md5).substring(0,12)+'...</td>'+
            '<td>'+formatSize(f.fileSize)+'</td>'+
            '<td><span class="status status-'+f.status.toLowerCase()+'">'+statusText(f.status)+'</span></td>'+
            '<td style="font-size:12px;color:#888;">'+f.createdAt+'</td>'+
            '<td>'+
                '<a class="btn btn-dl" href="/api/storage/download/'+f.md5+'">下载</a> '+
                '<button class="btn btn-danger" onclick="deleteFile(\''+f.md5+'\')">删除</button>'+
            '</td>'+
        '</tr>').join('');
    }catch(e){tbody.innerHTML='<tr><td colspan="6" class="empty">请求失败: '+esc(e.message)+'</td></tr>';}
}
async function deleteFile(md5){
    if(!confirm('确认删除此文件？'))return;
    await fetch('/api/storage/file/'+md5,{method:'DELETE'});
    loadFiles();
}
function statusText(s){const m={'UPLOADING':'上传中','READY':'已上传','CHUNKED':'已分块','EMBEDDED':'已入库','DELETED':'已删除'};return m[s]||s;}
function formatSize(b){const KB=1024,MB=1024*KB;if(b<KB)return b+' B';if(b<MB)return(b/KB).toFixed(1)+' KB';return(b/MB).toFixed(1)+' MB';}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
loadFiles();
</script>
</body>
</html>
