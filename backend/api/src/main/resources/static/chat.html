<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>对话 — LocalRAG</title>
<style>
:root {
  --primary: #6366f1; --primary-hover: #4f46e5;
  --bg: #f1f5f9; --card: #fff; --text: #1e293b; --text-muted: #64748b;
  --sidebar-bg: #0f172a; --sidebar-text: #94a3b8; --sidebar-active: #1e293b;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; line-height: 1.6; }
.sidebar { width: 240px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; padding: 24px 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
.sidebar .logo { padding: 0 24px 20px; font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -.02em; border-bottom: 1px solid #1e293b; }
.sidebar nav { flex: 1; padding: 12px 0; }
.sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; color: var(--sidebar-text); text-decoration: none; font-size: 14px; font-weight: 500; margin: 2px 12px; border-radius: 8px; transition: .15s; }
.sidebar a:hover { background: var(--sidebar-active); color: #e2e8f0; }
.sidebar a.active { background: var(--primary); color: #fff; }
.sidebar .footer { padding: 16px 24px; font-size: 11px; color: #475569; border-top: 1px solid #1e293b; }
.main { margin-left: 240px; flex: 1; padding: 32px 40px; max-width: 1100px; }
h2 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 6px; }
.sub { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }
.card { background: var(--card); border-radius: var(--radius); box-shadow: 0 1px 3px 0 rgba(0,0,0,.04); padding: 24px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
.chat-box { border: 1px solid #e2e8f0; border-radius: var(--radius); padding: 20px; min-height: 320px; max-height: 480px; overflow-y: auto; margin-bottom: 14px; background: #f8fafc; }
.input-row { display: flex; gap: 10px; }
.input-row input { flex: 1; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
.input-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
.btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
.btn-primary { background: var(--primary); color: #fff; } .btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
.empty { text-align: center; color: var(--text-muted); padding: 60px 0; font-size: 15px; line-height: 2; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="logo">LocalRAG</div>
    <nav>
        <a href="/upload.html">📤 文件上传</a>
        <a href="/kb.html">📚 知识库</a>
        <a href="/chat.html" class="active">💬 对话</a>
    </nav>
    <div class="footer">ES :9200 · MinIO :19001<br>Kafka :9092 · MySQL :3307</div>
</div>
<div class="main">
    <h2>💬 RAG 对话</h2>
    <p class="sub">基于知识库的智能问答 — DeepSeek</p>
    <div class="card">
        <div class="chat-box" id="chatBox">
            <div class="empty">retrieval + llm 模块开发中<br><small>入链已贯通：上传 → 解析 → 向量化 → 入库</small></div>
        </div>
        <div class="input-row">
            <input type="text" id="question" placeholder="输入问题..." disabled>
            <button class="btn btn-primary" disabled>发送</button>
        </div>
    </div>
</div>
</body>
</html>
