<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>对话 — LocalRAG</title>
<link rel="stylesheet" href="/common.css?v=2">
<style>
.chat-area { flex: 1; overflow-y: auto; padding: 24px 28px 12px; display: flex; flex-direction: column; gap: 14px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; animation: msgIn .3s; word-break: break-word; }
.msg.user { align-self: flex-end; background: #7c3aed; color: #fff; }
.msg.assistant { align-self: flex-start; background: #fff; color: #333; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.msg.assistant.typing { opacity: .6; }
.msg.error { align-self: flex-start; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
.bottom-bar { background: #fff; border-top: 1px solid #f0f0f5; padding: 16px 28px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.bottom-bar input { flex: 1; padding: 11px 16px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; color: #333; }
.bottom-bar input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.08); }
.new-chat-btn { padding: 10px 16px; border: none; background: #7c3aed; color: #fff; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 12px; width: 100%; transition: .15s; }
.new-chat-btn:hover { background: #6d28d9; }
@keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><div class="logo">R</div>LocalRAG</div>
    <nav>
        <a href="/upload.html">&#128196; 文件上传</a>
        <a href="/kb.html">&#128451; 知识库</a>
        <a href="/chat.html" class="active">&#128172; 对话助手</a>
        <a href="/sessions.html">&#128337; 历史会话</a>
    </nav>
    <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
</div>
<div class="main">
    <div class="topbar"><h1>对话助手</h1></div>
    <div class="chat-area" id="chatBox"><div style="text-align:center;color:#bbb;padding:80px 0;">点击「新对话」开始</div></div>
    <div class="bottom-bar">
        <span id="status"><span class="status-dot off"></span>检测中</span>
        <input type="text" id="question" placeholder="输入问题，回车发送..." onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();send();}">
        <button class="btn btn-primary" id="btnSend" onclick="send()">发送</button>
    </div>
</div>
<script>
function showConfirm(msg) { return new Promise(r => { const ov = document.createElement('div'); ov.className = 'modal-overlay'; ov.innerHTML = '<div class="modal-box"><p>'+msg+'</p><div class="btns"><button class="btn-cancel">取消</button><button class="btn-ok">确定</button></div></div>'; ov.querySelector('.btn-cancel').onclick = () => { ov.remove(); r(false); }; ov.querySelector('.btn-ok').onclick = () => { ov.remove(); r(true); }; document.body.appendChild(ov); }); }

const params = new URLSearchParams(window.location.search);
let sessionId = params.get('session') || null, streaming = false;

async function checkHealth() {
    try { const r = await fetch('/api/health'); const d = await r.json();
        updateStatus(d.code === 200); }
    catch(e) { updateStatus(false); }
}
function updateStatus(ok) {
    const s = document.getElementById('status');
    if (ok) { s.innerHTML = '<span class="status-dot on"></span>已连接'; }
    else { s.innerHTML = '<span class="status-dot off"></span>未连接'; }
}
checkHealth(); setInterval(checkHealth, 30000);

(async function() {
    if (!sessionId) {
        const r = await fetch('/api/llm/sessions');
        const d = await r.json();
        if (d.code === 200 && d.data && d.data.length > 0) {
            sessionId = d.data[0].sessionId;
            history.replaceState(null, '', '?session=' + sessionId);
        } else {
            const cr = await fetch('/api/llm/sessions', { method: 'POST' });
            const cd = await cr.json();
            if (cd.code === 200 && cd.data) {
                sessionId = cd.data.sessionId;
                history.replaceState(null, '', '?session=' + sessionId);
            }
        }
    }
    if (sessionId) loadHistory();
})();

async function newChat() {
    const r = await fetch('/api/llm/sessions', { method: 'POST' });
    const d = await r.json();
    if (d.code === 200 && d.data) window.location.href = '?session=' + d.data.sessionId;
}

let sendLock = false;
function send() {
    if (!sessionId) { alert('请先点击「新对话」'); return; }
    if (sendLock || streaming) return;
    const input = document.getElementById('question');
    const query = input.value.trim();
    if (!query) return;

    sendLock = true; streaming = true;
    input.value = ''; document.getElementById('btnSend').disabled = true;

    const box = document.getElementById('chatBox');
    if (!box.querySelector('.msg')) box.innerHTML = '';

    const userDiv = document.createElement('div');
    userDiv.className = 'msg user'; userDiv.textContent = query;
    box.appendChild(userDiv);

    const assistantDiv = document.createElement('div');
    assistantDiv.className = 'msg assistant typing'; assistantDiv.setAttribute('data-msg-id', Date.now());
    box.appendChild(assistantDiv);
    box.scrollTop = box.scrollHeight;

    let finished = false;
    const url = '/api/llm/chat?query=' + encodeURIComponent(query) + '&sessionId=' + sessionId;
    const es = new EventSource(url);
    es.onmessage = function(e) {
        if (finished) return;
        try {
            const d = JSON.parse(e.data);
            if (d.done) { es.close(); done(); return; }
            if (d.content) { assistantDiv.textContent += d.content; box.scrollTop = box.scrollHeight; }
        } catch(x) {}
    };
    es.onerror = function() {
        if (finished) return;
        if (assistantDiv.textContent.length === 0) {
            assistantDiv.textContent = '连接中断，请重试';
            assistantDiv.className = 'msg error';
        }
        es.close();
        done();
    };
    function done() { if (finished) return; finished = true; sendLock = false; streaming = false; document.getElementById('btnSend').disabled = false; assistantDiv.classList.remove('typing'); }
}

function loadHistory() {
    if (!sessionId) return;
    fetch('/api/llm/history?sessionId=' + sessionId).then(r => r.json()).then(d => {
        const box = document.getElementById('chatBox'); box.innerHTML = '';
        if (d.code === 200 && d.data) d.data.forEach(m => {
            const div = document.createElement('div'); div.className = 'msg ' + m.role; div.textContent = m.content || ''; box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}
</script>
</body>
</html>
