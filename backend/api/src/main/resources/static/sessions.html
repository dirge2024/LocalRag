<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>历史会话 — LocalRAG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', system-ui, sans-serif; background: #f0f2f8; color: #333; min-height: 100vh; padding: 16px; display: flex; gap: 16px; }
.sidebar { width: 200px; background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); padding: 24px 16px; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar .brand { display: flex; align-items: center; gap: 10px; padding: 0 8px 20px; font-size: 16px; font-weight: 700; border-bottom: 1px solid #f2f2f7; margin-bottom: 8px; }
.sidebar .brand .ico { width: 30px; height: 30px; background: #7c3aed; border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; font-weight: 700; }
.sidebar nav { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #555; text-decoration: none; font-size: 14px; border-radius: 10px; transition: .15s; }
.sidebar nav a:hover { background: #f5f3ff; color: #7c3aed; }
.sidebar nav a.active { background: #ede9fe; color: #7c3aed; font-weight: 600; }
.main { flex: 1; background: #fafaff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: #fff; padding: 14px 28px; border-bottom: 1px solid #f2f2f7; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.topbar h1 { font-size: 16px; font-weight: 600; }
.content { flex: 1; padding: 24px 28px; overflow-y: auto; }
.filters { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.filters input { padding: 8px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
.filters input:focus { border-color: #7c3aed; }
.filters input[type="date"] { width: 150px; }
.session-card { background: #fff; border: 1px solid #f0f0f5; border-radius: 10px; padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: .1s; }
.session-card:hover { border-color: #ddd6fe; box-shadow: 0 2px 6px rgba(0,0,0,.04); }
.session-card .info { flex: 1; min-width: 0; }
.session-card .title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.session-card .meta { font-size: 12px; color: #aaa; }
.session-card .actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
.btn-ghost { background: none; color: #888; } .btn-ghost:hover { background: #f4f4f5; }
.btn-del { background: none; color: #e53e3e; } .btn-del:hover { background: #fee2e2; }
.btn-pin { color: #f59e0b; }
.note { text-align: center; color: #bbb; padding: 40px; font-size: 14px; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><div class="ico">R</div>LocalRAG</div>
    <nav>
        <a href="/upload.html">&#128196; 文件上传</a>
        <a href="/kb.html">&#128451; 知识库</a>
        <a href="/chat.html">&#128172; 对话助手</a>
        <a href="/sessions.html" class="active">&#128337; 历史会话</a>
    </nav>
</div>
<div class="main">
    <div class="topbar"><h1>历史会话</h1></div>
    <div class="content">
        <div class="filters">
            <input type="text" id="search" placeholder="搜索会话标题..." oninput="render()">
            <input type="date" id="dateFrom" onchange="render()">
            <span style="color:#aaa;">至</span>
            <input type="date" id="dateTo" onchange="render()">
        </div>
        <div id="list"></div>
    </div>
</div>
<script>
let allSessions = [];

async function load() {
    const r = await fetch('/api/llm/sessions');
    const d = await r.json();
    allSessions = d.code === 200 ? (d.data || []) : [];
    render();
}

function render() {
    const search = (document.getElementById('search').value || '').toLowerCase();
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;

    let filtered = allSessions.filter(s => {
        if (search && !s.title.toLowerCase().includes(search)) return false;
        if (from && s.updatedAt && s.updatedAt < from) return false;
        if (to && s.updatedAt && s.updatedAt > to + 'T23:59:59') return false;
        return true;
    });

    const list = document.getElementById('list');
    if (filtered.length === 0) {
        list.innerHTML = '<div class="note">暂无匹配的会话</div>';
        return;
    }
    list.innerHTML = filtered.map(s => `
        <div class="session-card" onclick="openChat('${s.sessionId}')">
            <div class="info">
                <div class="title">${esc(s.title)}</div>
                <div class="meta">${s.updatedAt ? s.updatedAt.substring(0,10) : ''} · ${s.pinned ? '📌已置顶 · ' : ''}${s.updatedAt ? s.updatedAt.substring(11,16) : ''}</div>
            </div>
            <div class="actions" onclick="event.stopPropagation()">
                <button class="btn btn-pin" onclick="togglePin('${s.sessionId}',${s.pinned})">${s.pinned ? '取消置顶' : '置顶'}</button>
                <button class="btn btn-ghost" onclick="rename('${s.sessionId}','${esc(s.title)}')">重命名</button>
                <button class="btn btn-del" onclick="del('${s.sessionId}')">删除</button>
            </div>
        </div>
    `).join('');
}

function openChat(sid) { window.location.href = '/chat.html?session=' + sid; }

async function togglePin(sid, cur) {
    await fetch('/api/llm/sessions/' + sid, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pinned: !cur })
    });
    load();
}

async function rename(sid, old) {
    const v = prompt('修改名称', old);
    if (!v || v === old) return;
    await fetch('/api/llm/sessions/' + sid, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: v })
    });
    load();
}

async function del(sid) {
    if (!confirm('删除此会话及全部聊天记录？')) return;
    await fetch('/api/llm/sessions/' + sid, { method: 'DELETE' });
    load();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

load();
</script>
</body>
</html>
