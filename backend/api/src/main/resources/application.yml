server:
  port: 8088

spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: localrag
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:wsy2642@}

  datasource:
    url: jdbc:mysql://localhost:3307/localrag?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: wsy2642@
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

localrag:
  mysql:
    host: ${MYSQL_HOST:localhost}
    port: ${MYSQL_PORT:3307}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:wsy2642@}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:wsy2642@}
  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:wsy2642@}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:19000}
    access-key: ${MINIO_ACCESS_KEY:dirge}
    secret-key: ${MINIO_SECRET_KEY:wsy2642@}
    bucket: ${MINIO_BUCKET:localrag-documents}
  embedding:
    provider: ${EMBEDDING_PROVIDER:qwen}
    qwen:
      api-key: ${QWEN_API_KEY:}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
  kafka:
    brokers: ${KAFKA_BROKERS:localhost:9092}
    topic-prefix: ${KAFKA_TOPIC_PREFIX:localrag}
